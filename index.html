<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş / Kayıt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #181a1b;
      color: #f5f5f7;
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }
    .auth-card {
      background: #232136;
      border-radius: 22px;
      box-shadow: 0 8px 32px #7c3aed33, 0 1.5px 0 #23272b;
      padding: 2.5rem 2.1rem 2.1rem 2.1rem;
      width: 100%;
      max-width: 370px;
      position: relative;
      z-index: 1;
      animation: cardFadeIn 1.1s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes cardFadeIn {
      0% { opacity: 0; transform: translateY(-60px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .auth-title {
      font-size: 2rem;
      font-weight: bold;
      color: #ff9800;
      text-align: center;
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #7c3aed33;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.1em;
    }
    .auth-form input {
      background: #181a1b;
      color: #f5f5f7;
      border: 1.5px solid #7c3aed;
      border-radius: 12px;
      font-size: 1.08rem;
      padding: 0.7em 1.1em;
      transition: box-shadow 0.3s, border-color 0.3s, background 0.3s;
      outline: none;
    }
    .auth-form input:focus {
      box-shadow: 0 0 0 3px #ff9800cc, 0 2px 8px #7c3aed44;
      border-color: #ff9800;
      background: #232136;
    }
    .auth-btn {
      background: linear-gradient(90deg, #7c3aed 0%, #ff9800 100%);
      border: none;
      color: #fff;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1.08rem;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px #7c3aed22;
      padding: 0.7em 1.2em;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(.68,-0.55,.27,1.55), box-shadow 0.18s;
    }
    .auth-btn:hover, .auth-btn:focus {
      background: linear-gradient(90deg, #ff9800 0%, #7c3aed 100%);
      color: #fff;
      transform: scale(1.06) translateY(-2px) rotate(-1deg);
      box-shadow: 0 6px 24px #ff980044;
    }
    .auth-switch {
      background: none;
      border: none;
      color: #7c3aed;
      font-weight: bold;
      margin-top: 0.5em;
      cursor: pointer;
      text-align: center;
      font-size: 1rem;
      text-decoration: underline;
      transition: color 0.2s;
    }
    .auth-switch:hover { color: #ff9800; }
    .auth-error {
      color: #ff6b6b;
      font-size: 1.04rem;
      margin-top: 0.5rem;
      text-align: center;
      min-height: 1.2em;
    }
    .auth-success {
      color: #43ea7b;
      font-size: 1.04rem;
      margin-top: 0.5rem;
      text-align: center;
      min-height: 1.2em;
    }
    @media (max-width: 600px) {
      .auth-card {
        max-width: 98vw;
        padding: 1.2rem 0.5rem 1.2rem 0.5rem;
        border-radius: 18px;
      }
      .auth-title { font-size: 1.4rem; }
    }
    .chat-card {
      background: #232136;
      border-radius: 22px;
      box-shadow: 0 8px 32px #7c3aed33, 0 1.5px 0 #23272b;
      padding: 2.1rem 1.2rem 1.2rem 1.2rem;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 70vh;
      min-height: 400px;
      position: relative;
      z-index: 2;
      animation: cardFadeIn 1.1s cubic-bezier(.68,-0.55,.27,1.55);
    }
    .chat-title {
      color: #ff9800;
      font-size: 1.4rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1.1rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #7c3aed33;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      background: #181a1b;
      border-radius: 12px;
      padding: 1rem;
      font-size: 1.08rem;
      color: #fff;
      box-shadow: 0 2px 8px #7c3aed22;
      margin-bottom: 1rem;
    }
    .chat-message {
      margin-bottom: 0.7em;
      word-break: break-word;
      display: flex;
      align-items: flex-end;
    }
    .chat-user {
      color: #ff9800;
      font-weight: bold;
      margin-right: 0.4em;
    }
    .chat-text {
      color: #fff;
    }
    .chat-form {
      display: flex;
      gap: 0.5em;
    }
    #chat-input {
      flex: 1;
      border-radius: 10px;
      border: 1.5px solid #7c3aed;
      background: #181a1b;
      color: #fff;
      padding: 0.6em 1em;
      font-size: 1.08rem;
      outline: none;
      transition: border-color 0.3s;
    }
    #chat-input:focus {
      border-color: #ff9800;
    }
    #chat-send {
      background: linear-gradient(90deg, #7c3aed 0%, #ff9800 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.08rem;
      padding: 0.6em 1.2em;
      cursor: pointer;
      transition: background 0.3s, transform 0.18s;
    }
    #chat-send:hover {
      background: linear-gradient(90deg, #ff9800 0%, #7c3aed 100%);
      transform: scale(1.06) translateY(-2px) rotate(-1deg);
    }
    .logout-btn {
      margin-top:1.2em;
      background:linear-gradient(90deg,#7c3aed 0%,#ff9800 100%);
      color:#fff;
      font-weight:bold;
      border:none;
      border-radius:10px;
      padding:0.6em 1.2em;
      cursor:pointer;
      transition:background 0.3s;
    }
    .logout-btn:hover {
      background:linear-gradient(90deg,#ff9800 0%,#7c3aed 100%);
      color:#23272b;
    }
    @media (max-width: 600px) {
      .chat-card {
        max-width: 98vw;
        padding: 1.2rem 0.5rem 1.2rem 0.5rem;
        border-radius: 18px;
        height: 60vh;
        min-height: 300px;
      }
      .chat-messages { font-size: 1rem; padding: 0.7rem; }
      .chat-message { font-size: 1rem; padding: 0.6em 0.8em; }
    }
  </style>
</head>
<body>
  <div class="auth-card" id="auth-container">
    <div class="auth-title" id="form-title">Giriş Yap</div>
    <form class="auth-form" id="login-form" autocomplete="off">
      <input type="email" id="login-email" placeholder="E-posta" required />
      <input type="password" id="login-password" placeholder="Şifre" required minlength="6" />
      <button type="submit" class="auth-btn">Giriş Yap</button>
      <div class="auth-error" id="login-error"></div>
      <button type="button" class="auth-switch" id="show-signup">Hesabın yok mu? Kayıt Ol</button>
    </form>
    <form class="auth-form" id="signup-form" autocomplete="off" style="display:none;">
      <input type="email" id="signup-email" placeholder="E-posta" required />
      <input type="password" id="signup-password" placeholder="Şifre" required minlength="6" />
      <button type="submit" class="auth-btn">Kayıt Ol</button>
      <div class="auth-error" id="signup-error"></div>
      <div class="auth-success" id="signup-success"></div>
      <button type="button" class="auth-switch" id="show-login">Zaten hesabın var mı? Giriş Yap</button>
    </form>
  </div>
  <div id="chat-container" style="display:none;">
    <div class="chat-card">
      <div class="chat-title">Sohbet</div>
      <div id="chat-messages" class="chat-messages"></div>
      <form id="chat-form" class="chat-form" autocomplete="off">
        <input id="chat-input" type="text" placeholder="Mesajınızı yazın..." maxlength="300" required />
        <button id="chat-send" type="submit">Gönder</button>
      </form>
      <button id="logout-btn" class="logout-btn">Çıkış Yap</button>
    </div>
  </div>
  <script>
    // Formlar arası geçiş
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const showSignupBtn = document.getElementById('show-signup');
    const showLoginBtn = document.getElementById('show-login');
    const formTitle = document.getElementById('form-title');
    showSignupBtn.onclick = function() {
      loginForm.style.display = 'none';
      signupForm.style.display = 'flex';
      formTitle.textContent = 'Kayıt Ol';
    };
    showLoginBtn.onclick = function() {
      signupForm.style.display = 'none';
      loginForm.style.display = 'flex';
      formTitle.textContent = 'Giriş Yap';
    };
    // Demo giriş
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      errorDiv.textContent = '';
      if (!email.includes('@')) {
        errorDiv.textContent = 'Geçerli bir e-posta girin.';
        return;
      }
      if (password.length < 6) {
        errorDiv.textContent = 'Şifre en az 6 karakter olmalı.';
        return;
      }
      // Demo: Her giriş başarılı
      errorDiv.style.color = '#43ea7b';
      errorDiv.textContent = 'Giriş başarılı! (Demo)';
      setTimeout(() => {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('chat-container').style.display = 'flex';
      }, 700);
    });
    // Demo kayıt
    signupForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const errorDiv = document.getElementById('signup-error');
      const successDiv = document.getElementById('signup-success');
      errorDiv.textContent = '';
      successDiv.textContent = '';
      if (!email.includes('@')) {
        errorDiv.textContent = 'Geçerli bir e-posta girin.';
        return;
      }
      if (password.length < 6) {
        errorDiv.textContent = 'Şifre en az 6 karakter olmalı.';
        return;
      }
      // Demo: Her kayıt başarılı
      successDiv.textContent = 'Kayıt başarılı! Şimdi giriş yapabilirsin.';
      setTimeout(() => {
        showLoginBtn.click();
      }, 1200);
    });
  </script>
  <script>
    // Chat demo JS
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');
    const logoutBtn = document.getElementById('logout-btn');
    let chatHistory = [];
    function renderChat() {
      chatMessages.innerHTML = '';
      chatHistory.forEach(msg => {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message';
        msgDiv.innerHTML = `<span class="chat-user">Sen:</span> <span class="chat-text">${msg}</span>`;
        chatMessages.appendChild(msgDiv);
      });
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    chatForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;
      chatHistory.push(text);
      renderChat();
      chatInput.value = '';
    });
    logoutBtn.onclick = function() {
      document.getElementById('chat-container').style.display = 'none';
      document.getElementById('auth-container').style.display = 'block';
      chatHistory = [];
      renderChat();
    };
  </script>
</body>
</html>
