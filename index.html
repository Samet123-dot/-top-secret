<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş / Kayıt</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body {
      background: #181a1b;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Arka plan animasyonlu gradient */
    body::before {
      content: '';
      position: fixed;
      z-index: 0;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(120deg, #ff9800 0%, #283593 100%);
      opacity: 0.18;
      animation: bgRotate 12s linear infinite;
    }
    @keyframes bgRotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    /* Spotlight için kartın arka planı */
    .auth-card {
      background: #23272b;
      border-radius: 18px;
      box-shadow: 0 4px 32px #0008;
      padding: 2.5rem 2rem 2rem 2rem;
      width: 100%;
      max-width: 370px;
      opacity: 0;
      transform: translateY(-60px) scale(0.98);
      animation: cardFadeIn 1.1s cubic-bezier(.68,-0.55,.27,1.55) 0.2s forwards;
      position: relative;
      z-index: 1;
      transition: box-shadow 0.3s, filter 0.3s;
      /* Spotlight için ekstra */
      --spot-x: 50%;
      --spot-y: 50%;
      background-image: radial-gradient(600px circle at var(--spot-x) var(--spot-y), rgba(255,152,0,0.13), transparent 80%);
    }
    .auth-card:hover {
      box-shadow: 0 8px 40px #ff980088, 0 0 0 4px #28359333;
      filter: brightness(1.04) saturate(1.1);
    }
    @keyframes cardFadeIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .form-control, .form-control:focus {
      background: #181a1b;
      color: #fff;
      border: 1px solid #444;
      transition: box-shadow 0.3s, border-color 0.3s, background 0.3s;
      position: relative;
      z-index: 1;
    }
    .form-control:focus {
      box-shadow: 0 0 0 3px #ff9800cc, 0 2px 8px #28359344;
      border-color: #ff9800;
      background: #23272b;
      animation: inputFocusPop 0.4s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes inputFocusPop {
      60% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .btn-primary, .btn-secondary {
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(90deg, #ff9800 0%, #283593 100%);
      border: none;
      color: #fff;
      transition: transform 0.18s cubic-bezier(.68,-0.55,.27,1.55), box-shadow 0.18s;
      box-shadow: 0 2px 8px #ff980044;
    }
    .btn-primary:focus, .btn-primary:hover {
      background: linear-gradient(90deg, #ffa726 0%, #1a237e 100%);
      color: #fff;
      transform: scale(1.06) translateY(-2px) rotate(-1deg);
      box-shadow: 0 6px 24px #ff980044;
    }
    .btn-secondary {
      background: #283593;
      border: none;
      color: #fff;
      transition: transform 0.18s cubic-bezier(.68,-0.55,.27,1.55), box-shadow 0.18s;
    }
    .btn-secondary:focus, .btn-secondary:hover {
      background: #ff9800;
      color: #23272b;
      transform: scale(1.06) translateY(-2px) rotate(1deg);
      box-shadow: 0 6px 24px #28359344;
    }
    /* Ripple efekti */
    .btn-primary:active::after, .btn-secondary:active::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.25);
      border-radius: 100%;
      transform: translate(-50%, -50%);
      animation: ripple 0.5s linear;
      z-index: 2;
    }
    @keyframes ripple {
      to {
        width: 200%; height: 200%; opacity: 0;
      }
    }
    .error {
      color: #ff6b6b;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      color: #ff9800;
      text-align: center;
      text-shadow: 0 2px 8px #28359344;
      opacity: 0;
      transform: scale(0.8) rotate(-8deg);
      animation: logoPop 1.1s cubic-bezier(.68,-0.55,.27,1.55) 0.5s forwards;
    }
    @keyframes logoPop {
      60% {
        opacity: 1;
        transform: scale(1.15) rotate(4deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }
    .mb-3 { margin-bottom: 1.2rem !important; }
    h4 {
      color: #ff9800;
      text-align: center;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(20px);
      animation: titleFadeIn 0.8s cubic-bezier(.68,-0.55,.27,1.55) 0.7s forwards;
    }
    @keyframes titleFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    /* Form geçiş animasyonu */
    #login-form, #signup-form {
      transition: opacity 0.5s, transform 0.5s;
    }
    #login-form[style*="display: none"], #signup-form[style*="display: none"] {
      opacity: 0;
      transform: scale(0.96) translateY(20px) rotate(-2deg);
      pointer-events: none;
    }
    #login-form:not([style*="display: none"]), #signup-form:not([style*="display: none"]) {
      opacity: 1;
      transform: scale(1) translateY(0) rotate(0deg);
    }
  </style>
</head>
<body>
  <canvas id="snake-canvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;"></canvas>
  <div class="auth-card" id="auth-container">
    <div class="logo">top secret</div>
    <form id="login-form">
      <h4>Giriş Yap</h4>
      <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="E-posta" required />
      </div>
      <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="Şifre" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Giriş Yap</button>
      <button type="button" id="show-signup" class="btn btn-secondary w-100">Kayıt Ol</button>
      <div class="error" id="error-message"></div>
    </form>
    <form id="signup-form" style="display:none;">
      <h4>Kayıt Ol</h4>
      <div class="mb-3">
        <input type="email" id="signup-email" class="form-control" placeholder="E-posta" required />
      </div>
      <div class="mb-3">
        <input type="password" id="signup-password" class="form-control" placeholder="Şifre" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Kayıt Ol</button>
      <button type="button" id="show-login" class="btn btn-secondary w-100">Giriş Yap</button>
      <div class="error" id="signup-error-message"></div>
    </form>
  </div>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD39X1qF5C39TYzPcOhmo5lJVlRfU-dRvc",
      authDomain: "top-secret-a5628.firebaseapp.com",
      projectId: "top-secret-a5628",
      storageBucket: "top-secret-a5628.appspot.com",
      messagingSenderId: "854924115836",
      appId: "1:854924115836:web:be1a865f48e7a868376ef9",
      measurementId: "G-36WWQ06YRK"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Giriş formu işlemleri
    const loginForm = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    // Custom başarı mesajı fonksiyonu
    function showSuccessMessage(msg) {
      let el = document.getElementById('success-message');
      if (!el) {
        el = document.createElement('div');
        el.id = 'success-message';
        el.className = 'success-message';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => { el.style.display = 'none'; el.style.opacity = '1'; }, 600);
      }, 2200);
    }

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          showSuccessMessage('Giriş başarılı!');
          document.getElementById('auth-container').style.display = 'none';
          document.getElementById('chat-container').style.display = 'flex';
        })
        .catch(err => {
          errorMessage.textContent = err.message;
        });
    });

    // Kayıt formu işlemleri
    const signupForm = document.getElementById('signup-form');
    const showSignupBtn = document.getElementById('show-signup');
    const showLoginBtn = document.getElementById('show-login');
    const signupErrorMessage = document.getElementById('signup-error-message');

    showSignupBtn.onclick = function() {
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
    };
    showLoginBtn.onclick = function() {
      signupForm.style.display = 'none';
      loginForm.style.display = 'block';
    };

    signupForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert('Kayıt başarılı! Giriş yapabilirsiniz.');
          signupForm.style.display = 'none';
          loginForm.style.display = 'block';
        })
        .catch(err => {
          signupErrorMessage.textContent = err.message;
        });
    });

    // Mouse takip eden spotlight animasyonu
    const card = document.querySelector('.auth-card');
    card.addEventListener('mousemove', function(e) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--spot-x', `${x}px`);
      card.style.setProperty('--spot-y', `${y}px`);
    });
    card.addEventListener('mouseleave', function() {
      card.style.setProperty('--spot-x', '50%');
      card.style.setProperty('--spot-y', '50%');
    });

    // === Ejderha animasyonu: rastgele gezinme ===
    const canvas = document.getElementById('snake-canvas');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Yılan parametreleri
    const SEGMENTS = 30;
    const LENGTH = 18;
    const snake = [];
    for (let i = 0; i < SEGMENTS; i++) {
      snake.push({ x: width/2, y: height/2, angle: 0 });
    }
    let dragonTarget = { x: width/2, y: height/2 };
    let changeTargetTimer = 0;
    function randomTarget() {
      // Ekran kenarlarından biraz içeride rastgele bir hedef
      const margin = 60;
      return {
        x: Math.random() * (width - 2*margin) + margin,
        y: Math.random() * (height - 2*margin) + margin
      };
    }
    function animateDragon() {
      // Hedefi belli aralıklarla değiştir veya hedefe çok yaklaştıysa hemen değiştir
      changeTargetTimer--;
      const head = snake[0];
      const dx = dragonTarget.x - head.x;
      const dy = dragonTarget.y - head.y;
      const distToTarget = Math.sqrt(dx*dx + dy*dy);
      if (changeTargetTimer <= 0 || distToTarget < 30) {
        dragonTarget = randomTarget();
        changeTargetTimer = 80 + Math.random() * 120;
      }
      // Baş segment hedefe yaklaşır
      head.angle = Math.atan2(dy, dx);
      head.x += Math.cos(head.angle) * 6;
      head.y += Math.sin(head.angle) * 6;
      // Diğer segmentler bir öncekini takip eder
      for (let i = 1; i < SEGMENTS; i++) {
        const prev = snake[i-1];
        const seg = snake[i];
        const tx = prev.x - seg.x;
        const ty = prev.y - seg.y;
        const dist = Math.sqrt(tx*tx + ty*ty);
        const angle = Math.atan2(ty, tx);
        if (dist > LENGTH) {
          seg.x += Math.cos(angle) * (dist - LENGTH);
          seg.y += Math.sin(angle) * (dist - LENGTH);
        }
        seg.angle = angle;
      }
      // Çizim (aynı)
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      for (let i = SEGMENTS-1; i > 0; i--) {
        const grad = ctx.createLinearGradient(snake[i].x, snake[i].y, snake[i-1].x, snake[i-1].y);
        grad.addColorStop(0, '#283593');
        grad.addColorStop(1, '#ff9800');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 8 * (i / SEGMENTS) + 2;
        ctx.beginPath();
        ctx.moveTo(snake[i].x, snake[i].y);
        ctx.lineTo(snake[i-1].x, snake[i-1].y);
        ctx.stroke();
      }
      for (let i = 4; i < SEGMENTS; i += 4) {
        const seg = snake[i];
        const angle = seg.angle - Math.PI/2;
        ctx.save();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(seg.x, seg.y);
        ctx.lineTo(seg.x + Math.cos(angle) * 18, seg.y + Math.sin(angle) * 18);
        ctx.stroke();
        ctx.restore();
      }
      ctx.save();
      ctx.translate(head.x, head.y);
      ctx.rotate(head.angle);
      ctx.beginPath();
      ctx.ellipse(0, 0, 22, 14, 0, 0, Math.PI*2);
      ctx.fillStyle = '#ff9800';
      ctx.shadowColor = '#ff9800';
      ctx.shadowBlur = 16;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(8, -4, 3, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(8, -4, 1.2, 0, Math.PI*2);
      ctx.fillStyle = '#283593';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(12, 4);
      ctx.quadraticCurveTo(16, 10, 6, 8);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-8, -10);
      ctx.lineTo(-18, -22);
      ctx.moveTo(-8, 10);
      ctx.lineTo(-18, 22);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.restore();
      ctx.restore();
      requestAnimationFrame(animateDragon);
    }
    animateDragon();

    // === Chat için Firebase Realtime Database ===
    // Database SDK ekle
    var script = document.createElement('script');
    script.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    document.head.appendChild(script);
    script.onload = function() {
      const db = firebase.database();
      // Chat arayüzü
      const chatContainer = document.getElementById('chat-container');
      const chatForm = document.getElementById('chat-form');
      const chatInput = document.getElementById('chat-input');
      const chatMessages = document.getElementById('chat-messages');
      let username = localStorage.getItem('chat-username');
      function askUsername() {
        username = prompt('Kullanıcı adınızı girin:');
        if (username && username.trim().length > 0) {
          localStorage.setItem('chat-username', username);
        } else {
          askUsername();
        }
      }
      if (!username) askUsername();
      // Mesaj gönderme
      chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const text = chatInput.value.trim();
        if (!text) return;
        db.ref('messages').push({
          user: username,
          text: text,
          time: Date.now()
        });
        chatInput.value = '';
      });
      // Mesajları dinle ve ekrana yaz
      db.ref('messages').limitToLast(50).on('child_added', function(snapshot) {
        const msg = snapshot.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message';
        msgDiv.innerHTML = `<span class="chat-user">${msg.user}:</span> <span class="chat-text">${msg.text}</span>`;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    };
  </script>
  <style>
    .success-message {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #43ea7b 0%, #1de982 100%);
      color: #23272b;
      font-weight: bold;
      font-size: 1.15rem;
      padding: 0.9em 2.2em;
      border-radius: 12px;
      box-shadow: 0 4px 24px #1de98244;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.6s;
      display: none;
      letter-spacing: 0.5px;
      animation: popInSuccess 0.7s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes popInSuccess {
      0% { opacity: 0; transform: translateX(-50%) scale(0.7) translateY(-30px); }
      60% { opacity: 1; transform: translateX(-50%) scale(1.08) translateY(0); }
      100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }
  </style>
  <!-- Bootstrap 5 JS (isteğe bağlı) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chat kutusu arayüzü -->
  <style>
    #chat-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(24,26,27,0.98);
      z-index: 10;
      padding: 0;
      margin: 0;
      transition: opacity 0.5s;
    }
    .chat-box {
      width: 100%;
      max-width: 420px;
      background: #23272b;
      border-radius: 18px;
      box-shadow: 0 4px 32px #0008;
      padding: 1.5rem 1.2rem 1.2rem 1.2rem;
      margin-bottom: 2.5rem;
      display: flex;
      flex-direction: column;
      height: 70vh;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 1rem;
      background: #181a1b;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1.08rem;
      color: #fff;
      box-shadow: 0 2px 8px #28359322;
    }
    .chat-message {
      margin-bottom: 0.7em;
      word-break: break-word;
    }
    .chat-user {
      color: #ff9800;
      font-weight: bold;
      margin-right: 0.4em;
    }
    .chat-text {
      color: #fff;
    }
    #chat-form {
      display: flex;
      gap: 0.5em;
    }
    #chat-input {
      flex: 1;
      border-radius: 8px;
      border: 1px solid #444;
      background: #181a1b;
      color: #fff;
      padding: 0.6em 1em;
      font-size: 1.08rem;
      outline: none;
      transition: border-color 0.3s;
    }
    #chat-input:focus {
      border-color: #ff9800;
    }
    #chat-send {
      background: linear-gradient(90deg, #ff9800 0%, #283593 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6em 1.2em;
      font-size: 1.08rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s, transform 0.18s;
    }
    #chat-send:hover {
      background: linear-gradient(90deg, #ffa726 0%, #1a237e 100%);
      transform: scale(1.06) translateY(-2px) rotate(-1deg);
    }
  </style>
  <div id="chat-container">
    <div class="chat-box">
      <div id="chat-messages"></div>
      <form id="chat-form" autocomplete="off">
        <input id="chat-input" type="text" placeholder="Mesajınızı yazın..." maxlength="300" required />
        <button id="chat-send" type="submit">Gönder</button>
      </form>
    </div>
  </div>
</body>
</html>
