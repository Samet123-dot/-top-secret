<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #181a1b;
      color: #f5f5f7;
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }
    .register-card {
      background: #232136;
      border-radius: 22px;
      box-shadow: 0 8px 32px #7c3aed33, 0 1.5px 0 #23272b;
      padding: 2.5rem 2.1rem 2.1rem 2.1rem;
      width: 100%;
      max-width: 370px;
      position: relative;
      z-index: 1;
      animation: cardFadeIn 1.1s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes cardFadeIn {
      0% { opacity: 0; transform: translateY(-60px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .register-title {
      font-size: 2rem;
      font-weight: bold;
      color: #ff9800;
      text-align: center;
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #7c3aed33;
    }
    .register-form {
      display: flex;
      flex-direction: column;
      gap: 1.1em;
    }
    .register-form input {
      background: #181a1b;
      color: #f5f5f7;
      border: 1.5px solid #7c3aed;
      border-radius: 12px;
      font-size: 1.08rem;
      padding: 0.7em 1.1em;
      transition: box-shadow 0.3s, border-color 0.3s, background 0.3s;
      outline: none;
    }
    .register-form input:focus {
      box-shadow: 0 0 0 3px #ff9800cc, 0 2px 8px #7c3aed44;
      border-color: #ff9800;
      background: #232136;
    }
    .register-btn {
      background: linear-gradient(90deg, #7c3aed 0%, #ff9800 100%);
      border: none;
      color: #fff;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1.08rem;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px #7c3aed22;
      padding: 0.7em 1.2em;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(.68,-0.55,.27,1.55), box-shadow 0.18s;
    }
    .register-btn:hover, .register-btn:focus {
      background: linear-gradient(90deg, #ff9800 0%, #7c3aed 100%);
      color: #fff;
      transform: scale(1.06) translateY(-2px) rotate(-1deg);
      box-shadow: 0 6px 24px #ff980044;
    }
    .register-error {
      color: #ff6b6b;
      font-size: 1.04rem;
      margin-top: 0.5rem;
      text-align: center;
      min-height: 1.2em;
    }
    @media (max-width: 600px) {
      .register-card {
        max-width: 98vw;
        padding: 1.2rem 0.5rem 1.2rem 0.5rem;
        border-radius: 18px;
      }
      .register-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="register-title">Kayıt Ol</div>
    <form class="register-form" id="register-form" autocomplete="off">
      <input type="email" id="register-email" placeholder="E-posta" required />
      <input type="password" id="register-password" placeholder="Şifre" required minlength="6" />
      <button type="submit" class="register-btn">Kayıt Ol</button>
      <div class="register-error" id="register-error"></div>
    </form>
  </div>
  <script>
    // Demo: Form submitte hata göster (backend yoksa)
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      // Burada backend entegrasyonu yapılabilir
      if (!email.includes('@')) {
        document.getElementById('register-error').textContent = 'Geçerli bir e-posta girin.';
        return;
      }
      if (password.length < 6) {
        document.getElementById('register-error').textContent = 'Şifre en az 6 karakter olmalı.';
        return;
      }
      document.getElementById('register-error').textContent = 'Kayıt başarılı! (Demo)';
    });
  </script>
</body>
</html>
