<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş / Kayıt</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body {
      background: #181a1b;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: #23272b;
      border-radius: 18px;
      box-shadow: 0 4px 32px #0008;
      padding: 2.5rem 2rem 2rem 2rem;
      width: 100%;
      max-width: 370px;
    }
    .form-control, .form-control:focus {
      background: #181a1b;
      color: #fff;
      border: 1px solid #444;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00c6fb 0%, #005bea 100%);
      border: none;
    }
    .btn-secondary {
      background: #444;
      border: none;
    }
    .error {
      color: #ff6b6b;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      color: #00c6fb;
      text-align: center;
    }
    .mb-3 { margin-bottom: 1.2rem !important; }
    h4 { color: #fff; text-align: center; margin-bottom: 1.2rem; }
  </style>
</head>
<body>
  <div class="auth-card" id="auth-container">
    <div class="logo">top secret</div>
    <form id="login-form">
      <h4>Giriş Yap</h4>
      <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="E-posta" required />
      </div>
      <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="Şifre" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Giriş Yap</button>
      <button type="button" id="show-signup" class="btn btn-secondary w-100">Kayıt Ol</button>
      <div class="error" id="error-message"></div>
    </form>
    <form id="signup-form" style="display:none;">
      <h4>Kayıt Ol</h4>
      <div class="mb-3">
        <input type="email" id="signup-email" class="form-control" placeholder="E-posta" required />
      </div>
      <div class="mb-3">
        <input type="password" id="signup-password" class="form-control" placeholder="Şifre" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Kayıt Ol</button>
      <button type="button" id="show-login" class="btn btn-secondary w-100">Giriş Yap</button>
      <div class="error" id="signup-error-message"></div>
    </form>
  </div>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD39X1qF5C39TYzPcOhmo5lJVlRfU-dRvc",
      authDomain: "top-secret-a5628.firebaseapp.com",
      projectId: "top-secret-a5628",
      storageBucket: "top-secret-a5628.appspot.com",
      messagingSenderId: "854924115836",
      appId: "1:854924115836:web:be1a865f48e7a868376ef9",
      measurementId: "G-36WWQ06YRK"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Giriş formu işlemleri
    const loginForm = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert('Giriş başarılı!');
        })
        .catch(err => {
          errorMessage.textContent = err.message;
        });
    });

    // Kayıt formu işlemleri
    const signupForm = document.getElementById('signup-form');
    const showSignupBtn = document.getElementById('show-signup');
    const showLoginBtn = document.getElementById('show-login');
    const signupErrorMessage = document.getElementById('signup-error-message');

    showSignupBtn.onclick = function() {
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
    };
    showLoginBtn.onclick = function() {
      signupForm.style.display = 'none';
      loginForm.style.display = 'block';
    };

    signupForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert('Kayıt başarılı! Giriş yapabilirsiniz.');
          signupForm.style.display = 'none';
          loginForm.style.display = 'block';
        })
        .catch(err => {
          signupErrorMessage.textContent = err.message;
        });
    });
  </script>
  <!-- Bootstrap 5 JS (isteğe bağlı) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
