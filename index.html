<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Firebase Realtime Chat</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { background: #181a1b; color: #fff; font-family: Arial; }
    #messages { height: 250px; overflow-y: auto; background: #23272b; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #333; }
    #chat-form { display: flex; gap: 8px; }
    #chat-input { flex: 1; }
    .msg { margin-bottom: 8px; }
    .msg b { color: #00c6fb; }
  </style>
</head>
<body>
  <h1>Firebase Chat</h1>
  <div id="messages"></div>
  <form id="chat-form">
    <input type="text" id="chat-input" placeholder="Mesajınızı yazın..." required />
    <button type="submit">Gönder</button>
  </form>
  <script>
    // Firebase config
    var firebaseConfig = {
      databaseURL: "https://top-secret-a5628-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // Mesajları dinle ve ekrana yaz
    db.ref('messages').on('child_added', function(snapshot) {
      var data = snapshot.val();
      var messagesDiv = document.getElementById('messages');
      var msgDiv = document.createElement('div');
      msgDiv.className = 'msg';
      msgDiv.innerHTML = `<b>${data.user}:</b> ${data.text}`;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // Mesaj gönder
    document.getElementById('chat-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var user = prompt('Adınız (veya e-posta):');
      var text = document.getElementById('chat-input').value;
      db.ref('messages').push({ user, text });
      document.getElementById('chat-input').value = '';
    });
  </script>
</body>
</html>
