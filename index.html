<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş / Kayıt</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body {
      background: #181a1b;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Arka plan animasyonlu gradient */
    body::before {
      content: '';
      position: fixed;
      z-index: 0;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(120deg, #ff9800 0%, #283593 100%);
      opacity: 0.18;
      animation: bgRotate 12s linear infinite;
    }
    @keyframes bgRotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    /* Spotlight için kartın arka planı */
    .auth-card {
      background: #23272b;
      border-radius: 18px;
      box-shadow: 0 4px 32px #0008;
      padding: 2.5rem 2rem 2rem 2rem;
      width: 100%;
      max-width: 370px;
      opacity: 0;
      transform: translateY(-60px) scale(0.98);
      animation: cardFadeIn 1.1s cubic-bezier(.68,-0.55,.27,1.55) 0.2s forwards;
      position: relative;
      z-index: 1;
      transition: box-shadow 0.3s, filter 0.3s;
      /* Spotlight için ekstra */
      --spot-x: 50%;
      --spot-y: 50%;
      background-image: radial-gradient(600px circle at var(--spot-x) var(--spot-y), rgba(255,152,0,0.13), transparent 80%);
    }
    .auth-card:hover {
      box-shadow: 0 8px 40px #ff980088, 0 0 0 4px #28359333;
      filter: brightness(1.04) saturate(1.1);
    }
    @keyframes cardFadeIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .form-control, .form-control:focus {
      background: #181a1b;
      color: #fff;
      border: 1px solid #444;
      transition: box-shadow 0.3s, border-color 0.3s, background 0.3s;
      position: relative;
      z-index: 1;
    }
    .form-control:focus {
      box-shadow: 0 0 0 3px #ff9800cc, 0 2px 8px #28359344;
      border-color: #ff9800;
      background: #23272b;
      animation: inputFocusPop 0.4s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes inputFocusPop {
      60% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .btn-primary, .btn-secondary {
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(90deg, #ff9800 0%, #283593 100%);
      border: none;
      color: #fff;
      transition: transform 0.18s cubic-bezier(.68,-0.55,.27,1.55), box-shadow 0.18s;
      box-shadow: 0 2px 8px #ff980044;
    }
    .btn-primary:focus, .btn-primary:hover {
      background: linear-gradient(90deg, #ffa726 0%, #1a237e 100%);
      color: #fff;
      transform: scale(1.06) translateY(-2px) rotate(-1deg);
      box-shadow: 0 6px 24px #ff980044;
    }
    .btn-secondary {
      background: #283593;
      border: none;
      color: #fff;
      transition: transform 0.18s cubic-bezier(.68,-0.55,.27,1.55), box-shadow 0.18s;
    }
    .btn-secondary:focus, .btn-secondary:hover {
      background: #ff9800;
      color: #23272b;
      transform: scale(1.06) translateY(-2px) rotate(1deg);
      box-shadow: 0 6px 24px #28359344;
    }
    /* Ripple efekti */
    .btn-primary:active::after, .btn-secondary:active::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.25);
      border-radius: 100%;
      transform: translate(-50%, -50%);
      animation: ripple 0.5s linear;
      z-index: 2;
    }
    @keyframes ripple {
      to {
        width: 200%; height: 200%; opacity: 0;
      }
    }
    .error {
      color: #ff6b6b;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      color: #ff9800;
      text-align: center;
      text-shadow: 0 2px 8px #28359344;
      opacity: 0;
      transform: scale(0.8) rotate(-8deg);
      animation: logoPop 1.1s cubic-bezier(.68,-0.55,.27,1.55) 0.5s forwards;
    }
    @keyframes logoPop {
      60% {
        opacity: 1;
        transform: scale(1.15) rotate(4deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }
    .mb-3 { margin-bottom: 1.2rem !important; }
    h4 {
      color: #ff9800;
      text-align: center;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(20px);
      animation: titleFadeIn 0.8s cubic-bezier(.68,-0.55,.27,1.55) 0.7s forwards;
    }
    @keyframes titleFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    /* Form geçiş animasyonu */
    #login-form, #signup-form {
      transition: opacity 0.5s, transform 0.5s;
    }
    #login-form[style*="display: none"], #signup-form[style*="display: none"] {
      opacity: 0;
      transform: scale(0.96) translateY(20px) rotate(-2deg);
      pointer-events: none;
    }
    #login-form:not([style*="display: none"]), #signup-form:not([style*="display: none"]) {
      opacity: 1;
      transform: scale(1) translateY(0) rotate(0deg);
    }
  </style>
</head>
<body>
  <div class="auth-card" id="auth-container">
    <div class="logo">top secret</div>
    <form id="login-form">
      <h4>Giriş Yap</h4>
      <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="E-posta" required />
      </div>
      <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="Şifre" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Giriş Yap</button>
      <button type="button" id="show-signup" class="btn btn-secondary w-100">Kayıt Ol</button>
      <div class="error" id="error-message"></div>
    </form>
    <form id="signup-form" style="display:none;">
      <h4>Kayıt Ol</h4>
      <div class="mb-3">
        <input type="email" id="signup-email" class="form-control" placeholder="E-posta" required />
      </div>
      <div class="mb-3">
        <input type="password" id="signup-password" class="form-control" placeholder="Şifre" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-2">Kayıt Ol</button>
      <button type="button" id="show-login" class="btn btn-secondary w-100">Giriş Yap</button>
      <div class="error" id="signup-error-message"></div>
    </form>
  </div>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD39X1qF5C39TYzPcOhmo5lJVlRfU-dRvc",
      authDomain: "top-secret-a5628.firebaseapp.com",
      projectId: "top-secret-a5628",
      storageBucket: "top-secret-a5628.appspot.com",
      messagingSenderId: "854924115836",
      appId: "1:854924115836:web:be1a865f48e7a868376ef9",
      measurementId: "G-36WWQ06YRK"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Giriş formu işlemleri
    const loginForm = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert('Giriş başarılı!');
        })
        .catch(err => {
          errorMessage.textContent = err.message;
        });
    });

    // Kayıt formu işlemleri
    const signupForm = document.getElementById('signup-form');
    const showSignupBtn = document.getElementById('show-signup');
    const showLoginBtn = document.getElementById('show-login');
    const signupErrorMessage = document.getElementById('signup-error-message');

    showSignupBtn.onclick = function() {
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
    };
    showLoginBtn.onclick = function() {
      signupForm.style.display = 'none';
      loginForm.style.display = 'block';
    };

    signupForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert('Kayıt başarılı! Giriş yapabilirsiniz.');
          signupForm.style.display = 'none';
          loginForm.style.display = 'block';
        })
        .catch(err => {
          signupErrorMessage.textContent = err.message;
        });
    });

    // Mouse takip eden spotlight animasyonu
    const card = document.querySelector('.auth-card');
    card.addEventListener('mousemove', function(e) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--spot-x', `${x}px`);
      card.style.setProperty('--spot-y', `${y}px`);
    });
    card.addEventListener('mouseleave', function() {
      card.style.setProperty('--spot-x', '50%');
      card.style.setProperty('--spot-y', '50%');
    });
  </script>
  <!-- Bootstrap 5 JS (isteğe bağlı) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
